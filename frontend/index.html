<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gestión | Panel Principal</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>  
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-layers-half logo-icon"></i>
                <h2>GestionTI</h2>
            </div>
            <nav class="sidebar-menu">
                <button class="nav-link" data-modulo="usuarios">
                    <i class="bi bi-people-fill"></i> Gestión de Usuarios
                </button>
                <button class="nav-link" data-modulo="clientes">
                    <i class="bi bi-briefcase-fill"></i> Gestión de Clientes
                </button>
                <button class="nav-link" data-modulo="proyectos">
                    <i class="bi bi-folder-fill"></i> Control de Proyectos
                </button>
                <button class="nav-link" data-modulo="solicitudes">
                    <i class="bi bi-clipboard-check-fill"></i> Solicitudes
                </button>
            </nav>
            <div class="sidebar-footer">
                <div class="user-badge">
                    <i class="bi bi-person-circle"></i>
                    <div class="user-info">
                        <span id="sesion-username">Carlos Ojeda</span>
                        <small id="sesion-rol">Supervisor</small>
                    </div>
                </div>
                <button id="btn-logout" class="btn-logout-sidebar">
                    <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="modulo-titulo">Gestión de Usuarios</h1>
                <div class="top-bar-actions">
                    <span class="fecha-actual" id="txt-fecha">2026</span>
                </div>
            </header>
            
            <section id="contenedor-dinamico" class="content-body">
                <div class="loading-spinner">Cargando módulo...</div>
            </section>
        </main>
    </div>

    <script src="js/api.js" type="module"></script>
</body>
</html>
